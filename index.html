<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<meta name="theme-color" content="#0d1b2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RampUp">
<title>RampUp · URI Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
/* ── RESET ──────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --dark:#0d1b2e;
  --dark2:#112236;
  --dark3:#162e48;
  --panel:#0f2035;
  --panel2:#132840;
  --blue:#1a9fff;
  --blue2:#1488d8;
  --blue-dim:rgba(26,159,255,.15);
  --blue-dim2:rgba(26,159,255,.25);
  --green:#1aff8c;
  --green-dim:rgba(26,255,140,.15);
  --amber:#ffbe1a;
  --amber-dim:rgba(255,190,26,.15);
  --red:#ff4a4a;
  --red-dim:rgba(255,74,74,.15);
  --purple:#a855f7;
  --purple-dim:rgba(168,85,247,.15);
  --uri-navy:#002147;
  --text:#ffffff;
  --text2:rgba(255,255,255,.75);
  --text3:rgba(255,255,255,.45);
  --text4:rgba(255,255,255,.25);
  --border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.14);
  --font:'Nunito',sans-serif;
  --font2:'Nunito Sans',sans-serif;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
  --r:16px;--rl:22px;--rxl:28px;
}
html,body{height:100%;overflow:hidden;background:var(--dark);font-family:var(--font);color:var(--text)}
#app{
  height:100dvh;height:100vh;
  max-width:430px;margin:0 auto;
  position:relative;overflow:hidden;
  background:var(--dark);
}

/* ── MAP (always the canvas) ─────────────── */
#map{
  position:absolute;inset:0;z-index:0;
  background:var(--dark);
}
#map-placeholder{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:10px;color:var(--text3);font-size:13px;
  background:radial-gradient(ellipse at 40% 40%,#0d2a44 0%,#070f1a 100%);
}
.map-grid-line{
  position:absolute;background:rgba(26,159,255,.04);
}

/* Leaflet overrides for dark mode */
/* dark_all tiles are natively dark — no filter needed */
.leaflet-control-zoom{border:none!important;box-shadow:none!important;display:none}
.leaflet-control-attribution{display:none!important}
.you-ring{
  width:22px;height:22px;border-radius:50%;
  background:#1a9fff;border:3px solid #fff;
  box-shadow:0 0 0 6px rgba(26,159,255,.3);
  animation:you-pulse 2s infinite;
}
@keyframes you-pulse{
  0%,100%{box-shadow:0 0 0 4px rgba(26,159,255,.25)}
  50%{box-shadow:0 0 0 12px rgba(26,159,255,0)}
}

/* ── TOP UI (floats over map) ─────────────── */
.top-ui{
  position:absolute;top:0;left:0;right:0;z-index:100;
  padding:calc(14px + var(--st)) 16px 0;
  pointer-events:none;
}
.top-ui>*{pointer-events:all}

/* Avatar / branding pill */
.brand-pill{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--panel2);border:1px solid var(--border2);
  border-radius:20px;padding:6px 14px 6px 6px;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}
.brand-icon{
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,#1a9fff,#0066cc);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
}
.brand-name{font-size:14px;font-weight:800;color:var(--text);letter-spacing:-.2px}
.brand-sub{font-size:10px;font-weight:700;color:var(--blue);letter-spacing:.4px;text-transform:uppercase}

/* Issue alert bar (like "Detour in effect") */
.alert-pill{
  display:none;align-items:center;gap:7px;
  background:var(--amber);border-radius:20px;
  padding:7px 14px;font-size:12px;font-weight:800;
  color:#000;cursor:pointer;
  box-shadow:0 4px 20px rgba(255,190,26,.4);
  margin-top:10px;width:fit-content;
}
.alert-pill.show{display:inline-flex;animation:fadein .3s}
@keyframes fadein{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.alert-dot{width:6px;height:6px;border-radius:50%;background:#000;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* FAB buttons (right rail — like Transit's pin/bell/locate) */
.fab-rail{
  position:absolute;right:14px;z-index:100;
  display:flex;flex-direction:column;gap:9px;
  top:calc(80px + var(--st));
}
.fab{
  width:42px;height:42px;border-radius:50%;
  background:var(--panel2);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
  transition:all .15s;
}
.fab:active{transform:scale(.92);background:var(--dark3)}
.fab.active{background:var(--blue);border-color:var(--blue);box-shadow:0 4px 20px rgba(26,159,255,.5)}

/* ── SEARCH BAR (hovers in map) ───────────── */
.search-bar{
  position:absolute;left:16px;right:70px;z-index:100;
  transition:top .4s cubic-bezier(.32,.72,0,1);
}
.search-inner{
  display:flex;align-items:center;gap:10px;
  background:var(--panel);border:1.5px solid var(--border2);
  border-radius:var(--rl);padding:13px 16px;
  box-shadow:0 8px 32px rgba(0,0,0,.6),0 2px 8px rgba(0,0,0,.4);
  cursor:pointer;
  transition:border-color .15s;
}
.search-inner:focus-within{border-color:var(--blue)}
.search-icon{font-size:17px;flex-shrink:0;color:var(--text3)}
#search-input{
  flex:1;border:none;outline:none;
  font-family:var(--font);font-size:15px;font-weight:700;
  color:var(--text);background:transparent;
}
#search-input::placeholder{color:var(--text3);font-weight:700}

/* ── BOTTOM SHEET ────────────────────────── */
/*
  3 states:
  .peek    — just the handle + first row peeks up
  .partial — shows the building list (default home state)
  .full    — fully open
*/
.sheet{
  position:absolute;left:0;right:0;bottom:0;z-index:200;
  background:var(--panel);
  border-radius:24px 24px 0 0;
  box-shadow:0 -8px 40px rgba(0,0,0,.7);
  overflow:hidden;
  /* KEY: sheet only takes bottom ~55% — map always visible above */
  height:56vh;
  display:flex;flex-direction:column;
  transition:height .38s cubic-bezier(.32,.72,0,1);
}
.sheet.expanded{height:88vh;}
.sheet.nav-mode{height:72vh;}
.sheet.nav-mode.expanded{height:88vh;}
.sheet-handle{
  width:36px;height:4px;background:var(--border2);
  border-radius:2px;margin:10px auto 0;flex-shrink:0;cursor:grab;
}
.sheet-handle:active{cursor:grabbing}

/* Sheet in nav mode (after tapping a building) */
.sheet.nav-mode .home-content{display:none}
.sheet.nav-mode .nav-content{display:flex}
.nav-content{display:none;flex-direction:column;flex:1;overflow-y:auto}
.nav-content::-webkit-scrollbar{display:none}

/* ── HOME SHEET CONTENT ───────────────────── */
.home-content{display:flex;flex-direction:column;flex:1;overflow:hidden}

/* "Where to?" heading row */
.where-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 10px;flex-shrink:0;
}
.where-title{font-size:22px;font-weight:900;color:var(--text);letter-spacing:-.3px}
.where-count{
  font-size:11px;font-weight:700;color:var(--blue);
  background:var(--blue-dim);border-radius:12px;padding:3px 9px;
}

/* Filter chips */
.filter-row{
  display:flex;gap:7px;padding:0 18px 12px;
  overflow-x:auto;scrollbar-width:none;flex-shrink:0;
}
.filter-row::-webkit-scrollbar{display:none}
.chip{
  white-space:nowrap;padding:7px 14px;border-radius:18px;
  font-family:var(--font);font-size:12px;font-weight:700;
  cursor:pointer;transition:all .15s;flex-shrink:0;
  border:1.5px solid var(--border2);
  background:var(--panel2);color:var(--text3);
}
.chip:active{transform:scale(.95)}
.chip.on{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 12px rgba(26,159,255,.4)}
.chip.issue-chip.on{background:var(--amber);border-color:var(--amber);color:#000}

/* Building list */
.blist{flex:1;overflow-y:auto;padding:0 0 calc(16px + var(--sb));-webkit-overflow-scrolling:touch}
.blist::-webkit-scrollbar{display:none}

.brow{
  display:flex;align-items:center;
  padding:13px 18px;
  border-top:1px solid var(--border);
  cursor:pointer;transition:background .1s;
  gap:14px;
}
.brow:first-child{border-top:none}
.brow:active{background:rgba(255,255,255,.04)}

/* Big number style (like Transit's "66") */
.brow-num{
  width:52px;flex-shrink:0;text-align:center;
}
.brow-num-text{
  font-size:26px;font-weight:900;line-height:1;
  letter-spacing:-.5px;
}
.brow-num-text.full{color:var(--green)}
.brow-num-text.public{color:var(--amber)}
.brow-num-text.limited{color:var(--red)}
.brow-icon-sub{font-size:11px;margin-top:2px;color:var(--text3);font-weight:700}

.brow-body{flex:1;min-width:0}
.brow-name{font-size:15px;font-weight:800;color:var(--text);line-height:1.2;margin-bottom:3px}
.brow-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tier-tag{
  font-size:10px;font-weight:800;padding:2px 7px;border-radius:8px;
  letter-spacing:.1px;
}
.tier-full{background:rgba(26,255,140,.15);color:var(--green)}
.tier-public{background:rgba(255,190,26,.15);color:var(--amber)}
.tier-limited{background:rgba(255,74,74,.15);color:var(--red)}
.brow-cat{font-size:10px;color:var(--text3);font-weight:600}
.issue-badge{
  font-size:9px;font-weight:800;color:var(--amber);
  background:var(--amber-dim);border-radius:6px;padding:2px 6px;
}

/* Difficulty badge */
.diff-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:800;padding:2px 8px;border-radius:8px;
}
.diff-easy{background:rgba(26,255,140,.12);color:var(--green)}
.diff-mod{background:rgba(255,190,26,.12);color:var(--amber)}
.diff-hard{background:rgba(255,74,74,.12);color:var(--red)}
.diff-expert{background:rgba(168,85,247,.12);color:var(--purple)}

.brow-right{text-align:right;flex-shrink:0}
.brow-dist{font-size:13px;font-weight:700;color:var(--text3)}
.brow-arrow{font-size:14px;color:var(--text4);margin-top:4px}

/* ── NAV SHEET CONTENT ────────────────────── */
/* Header: Route number + name + GO button */
.nav-header{
  display:flex;align-items:flex-start;gap:12px;
  padding:14px 18px 12px;flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.nav-route-num{
  font-size:48px;font-weight:900;line-height:1;
  letter-spacing:-1px;flex-shrink:0;
}
.nav-route-num.full{color:var(--green)}
.nav-route-num.public{color:var(--amber)}
.nav-route-num.limited{color:var(--red)}
.nav-route-info{flex:1;min-width:0}
.nav-direction{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.nav-arrow-icon{width:22px;height:22px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.nav-dest-name{font-size:17px;font-weight:900;color:var(--text);line-height:1.2}
.nav-sub{font-size:12px;color:var(--text3);font-family:var(--font2);margin-top:2px}

.go-btn{
  width:62px;height:62px;border-radius:18px;border:none;
  background:var(--blue);color:#fff;
  font-family:var(--font);font-size:18px;font-weight:900;
  cursor:pointer;flex-shrink:0;
  box-shadow:0 6px 24px rgba(26,159,255,.55);
  transition:transform .12s;
  display:flex;align-items:center;justify-content:center;
}
.go-btn:active{transform:scale(.93)}

/* Stat tiles (like Transit's "12 min / 55 min scheduled / 18:46") */
.stat-row{
  display:flex;gap:8px;padding:12px 18px;flex-shrink:0;
  overflow-x:auto;scrollbar-width:none;
}
.stat-row::-webkit-scrollbar{display:none}
.stat-tile{
  flex-shrink:0;border-radius:var(--r);padding:12px 14px;
  min-width:90px;
}
.stat-tile-primary{background:var(--blue);box-shadow:0 4px 20px rgba(26,159,255,.4)}
.stat-tile-secondary{background:var(--panel2);border:1px solid var(--border2)}
.stat-tile-warn{background:var(--amber);box-shadow:0 4px 16px rgba(255,190,26,.3)}
.stat-num{font-size:32px;font-weight:900;line-height:1;letter-spacing:-.5px}
.stat-tile-primary .stat-num{color:#fff}
.stat-tile-secondary .stat-num{color:var(--text2)}
.stat-tile-warn .stat-num{color:#000;font-size:14px}
.stat-label{font-size:11px;font-weight:700;margin-top:3px}
.stat-tile-primary .stat-label{color:rgba(255,255,255,.7)}
.stat-tile-secondary .stat-label{color:var(--text3)}
.stat-tile-warn .stat-label{color:rgba(0,0,0,.6);font-size:11px;font-weight:800}
.stat-sublabel{
  font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
  margin-top:5px;opacity:.6;
}

/* Alert row */
.nav-alerts{
  display:flex;gap:8px;padding:0 18px 10px;flex-wrap:wrap;flex-shrink:0;
}
.nav-alert-pill{
  display:flex;align-items:center;gap:6px;border-radius:12px;
  padding:7px 12px;font-size:12px;font-weight:800;cursor:pointer;
}
.nav-alert-warn{background:var(--amber);color:#000;box-shadow:0 3px 12px rgba(255,190,26,.3)}
.nav-alert-info{background:var(--panel2);border:1px solid var(--border2);color:var(--text2)}

/* Step timeline */
.step-timeline{
  padding:8px 18px calc(20px + var(--sb));flex:1;
}
.step-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:4px}
.step-dot-col{
  display:flex;flex-direction:column;align-items:center;
  width:20px;flex-shrink:0;padding-top:4px;
}
.step-dot{
  width:14px;height:14px;border-radius:50%;flex-shrink:0;
  border:2.5px solid var(--border2);background:var(--panel);
  transition:all .3s;
}
.step-dot.done{background:var(--green);border-color:var(--green);box-shadow:0 0 8px rgba(26,255,140,.5)}
.step-dot.active{
  background:var(--blue);border-color:var(--blue);
  box-shadow:0 0 12px rgba(26,159,255,.7);
  animation:dot-pulse 1.5s infinite;
}
@keyframes dot-pulse{
  0%,100%{box-shadow:0 0 8px rgba(26,159,255,.5)}
  50%{box-shadow:0 0 18px rgba(26,159,255,.9)}
}
.step-dot.upcoming{background:transparent;border-color:var(--border2)}
.step-line{
  width:2px;flex:1;min-height:32px;margin:3px 0;
  background:var(--border2);border-radius:1px;
  transition:background .3s;
}
.step-line.done{background:var(--green)}
.step-line.active{background:linear-gradient(var(--blue),var(--border2))}
.step-content{flex:1;padding-bottom:20px}
.step-time{
  font-size:10px;font-weight:700;color:var(--blue);
  letter-spacing:.4px;text-transform:uppercase;margin-bottom:3px;
}
.step-text{font-size:14px;font-weight:700;color:var(--text);line-height:1.4}
.step-subtext{font-size:12px;color:var(--text3);font-family:var(--font2);line-height:1.4;margin-top:3px}
.step-entrance-card{
  background:var(--panel2);border:1px solid var(--border2);
  border-radius:var(--r);padding:11px 13px;margin-top:8px;
}
.ent-label{font-size:9px;font-weight:800;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}
.ent-side{font-size:13px;font-weight:800;color:var(--text);margin-bottom:7px}
.ent-features{display:flex;flex-wrap:wrap;gap:5px}
.ent-feat{
  background:var(--blue-dim);border:1px solid rgba(26,159,255,.2);
  border-radius:8px;padding:3px 9px;font-size:10px;font-weight:700;color:var(--blue);
}
.ent-feat.warn{background:var(--amber-dim);border-color:rgba(255,190,26,.2);color:var(--amber)}

/* ── REPORT BTN (in nav) ──────────────────── */
.report-row{
  padding:0 18px 14px;flex-shrink:0;
}
.report-btn{
  width:100%;padding:13px;border-radius:var(--rl);
  background:var(--panel2);border:1.5px solid var(--border2);
  font-family:var(--font);font-size:13px;font-weight:800;color:var(--text3);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
}
.report-btn:active{background:var(--dark3)}

/* ── ARRIVED OVERLAY ─────────────────────── */
#arrived-overlay{
  position:absolute;inset:0;z-index:500;
  display:none;flex-direction:column;
  align-items:center;justify-content:flex-end;
  padding-bottom:calc(32px + var(--sb));
}
#arrived-overlay.show{display:flex;animation:overfadein .4s}
@keyframes overfadein{from{opacity:0}to{opacity:1}}
.arrived-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 60%,rgba(26,255,140,.18) 0%,rgba(13,27,46,.95) 60%);
}
.arrived-content{
  position:relative;z-index:1;text-align:center;
  width:100%;padding:0 24px;
}
.confetti-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.cp{position:absolute;border-radius:2px;animation:fall linear infinite}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.arrived-big{font-size:72px;margin-bottom:8px;animation:pop .5s cubic-bezier(.34,1.56,.64,1) both}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.arrived-title{font-size:34px;font-weight:900;color:#fff;margin-bottom:6px;animation:fadein .4s .3s both}
.arrived-bldg{font-size:16px;color:rgba(255,255,255,.7);font-family:var(--font2);margin-bottom:24px;animation:fadein .4s .45s both}
.arrived-card{
  background:rgba(255,255,255,.06);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.12);border-radius:var(--rl);
  padding:18px;margin-bottom:16px;text-align:left;
  animation:fadein .4s .6s both;
}
.arrived-ent-side{font-size:16px;font-weight:900;color:#fff;margin-bottom:10px}
.arrived-feats{display:flex;flex-wrap:wrap;gap:6px}
.arrived-feat{
  background:rgba(26,159,255,.2);border:1px solid rgba(26,159,255,.3);
  border-radius:10px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--blue);
}
.arrived-feat.warn{background:rgba(255,190,26,.2);border-color:rgba(255,190,26,.3);color:var(--amber)}
.arrived-issue{
  background:rgba(255,190,26,.15);border:1px solid rgba(255,190,26,.25);
  border-radius:var(--r);padding:10px 12px;margin-bottom:12px;
  display:none;gap:8px;align-items:flex-start;animation:fadein .4s .7s both;
}
.arrived-issue.show{display:flex}
.ai-title{font-size:12px;font-weight:800;color:var(--amber);margin-bottom:2px}
.ai-desc{font-size:11px;color:rgba(255,255,255,.6);font-family:var(--font2)}
.arrived-actions{display:flex;flex-direction:column;gap:9px;width:100%;animation:fadein .4s .8s both}
.btn-dark{
  width:100%;padding:15px;border-radius:var(--rl);border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.08);color:#fff;font-family:var(--font);font-size:14px;font-weight:800;cursor:pointer;
}
.btn-green{
  width:100%;padding:15px;border-radius:var(--rl);border:none;
  background:var(--green);color:#000;font-family:var(--font);font-size:15px;font-weight:900;cursor:pointer;
}
.arrived-back{
  position:absolute;top:calc(16px + var(--st));left:14px;z-index:2;
}

/* ── REPORT SHEET ─────────────────────────── */
.rsheet-overlay{
  position:absolute;inset:0;z-index:600;
  background:rgba(0,0,0,.5);
  display:none;align-items:flex-end;
}
.rsheet-overlay.open{display:flex;animation:fadein .2s}
.rsheet{
  background:var(--panel);border-radius:24px 24px 0 0;width:100%;
  padding:0 18px calc(18px + var(--sb));
  animation:slideup .3s cubic-bezier(.32,.72,0,1);
}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.rsheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 16px}
.rsheet-title{font-size:18px;font-weight:900;color:var(--text);margin-bottom:5px}
.rsheet-sub{font-size:13px;color:var(--text3);font-family:var(--font2);margin-bottom:16px}
.rtype-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.rtype{
  padding:13px;border-radius:var(--r);border:1.5px solid var(--border2);
  background:var(--panel2);cursor:pointer;text-align:center;transition:all .12s;
}
.rtype.on{border-color:var(--blue);background:var(--blue-dim)}
.rtype:active{transform:scale(.97)}
.rtype-icon{font-size:22px;margin-bottom:4px}
.rtype-lbl{font-size:12px;font-weight:800;color:var(--text2)}
.rta{
  width:100%;padding:12px 13px;font-family:var(--font2);font-size:13px;
  color:var(--text);background:var(--panel2);border:1.5px solid var(--border2);
  border-radius:var(--r);resize:none;min-height:75px;outline:none;margin-bottom:13px;
}
.rta:focus{border-color:var(--blue)}
.rsubmit{
  width:100%;padding:15px;border-radius:var(--rl);border:none;
  background:var(--blue);color:#fff;font-family:var(--font);font-size:15px;font-weight:800;cursor:pointer;
  box-shadow:0 4px 20px rgba(26,159,255,.4);transition:transform .12s;
}
.rsubmit:active{transform:scale(.97)}

/* ── UTILITY ──────────────────────────────── */
::-webkit-scrollbar{display:none}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app">

  <!-- MAP LAYER (always present) -->
  <div id="map">
    <div id="map-placeholder">
      <!-- grid lines for visual interest before map loads -->
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 40% 35%,#0d2a44 0%,#050d18 100%)"></div>
    </div>
  </div>

  <!-- TOP UI -->
  <div class="top-ui">
    <div class="brand-pill">
      <div class="brand-icon">♿</div>
      <div>
        <div class="brand-name">RampUp</div>
        <div class="brand-sub">URI Kingston</div>
      </div>
    </div>
    <div class="alert-pill" id="alert-pill">
      <div class="alert-dot"></div>
      <span id="alert-text">2 issues reported on campus</span>
    </div>
  </div>

  <!-- FAB RAIL -->
  <div class="fab-rail">
    <div class="fab" id="fab-locate" title="My location" onclick="locateMe()">📍</div>
    <div class="fab" id="fab-report" title="Report issue" onclick="openReportSheet(null)">⚑</div>
    <div class="fab" id="fab-close-nav" title="Close navigation" onclick="closeNav()" style="display:none;background:var(--red);border-color:var(--red)">✕</div>
  </div>

  <!-- SEARCH BAR (floats over map) -->
  <div class="search-bar" id="search-bar" style="top:calc(70px + var(--st))">
    <div class="search-inner">
      <span class="search-icon">🔍</span>
      <input id="search-input" type="search" placeholder="Where to?" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
  </div>

  <!-- BOTTOM SHEET -->
  <div class="sheet" id="sheet">
    <div class="sheet-handle" id="sheet-handle"></div>

    <!-- HOME CONTENT -->
    <div class="home-content" id="home-content">
      <div class="where-row">
        <div class="where-title">Where to?</div>
        <div class="where-count" id="where-count">82 buildings</div>
      </div>
      <div class="filter-row" id="filter-row">
        <div class="chip on" data-f="all">All</div>
        <div class="chip" data-f="full">♿ Accessible</div>
        <div class="chip" data-f="public">⚡ Public access</div>
        <div class="chip" data-f="limited">⚠ Limited</div>
        <div class="chip issue-chip" data-f="issues">🔴 Has issues</div>
      </div>
      <div class="blist" id="blist"></div>
    </div>

    <!-- NAV CONTENT -->
    <div class="nav-content" id="nav-content">
      <!-- Route header -->
      <div class="nav-header">
        <div class="nav-route-num" id="nav-num">--</div>
        <div class="nav-route-info">
          <div class="nav-direction">
            <div class="nav-arrow-icon">→</div>
            <div class="nav-dest-name" id="nav-dest-name">Building</div>
          </div>
          <div class="nav-sub" id="nav-sub">Loading…</div>
        </div>
        <button class="go-btn" id="go-btn" onclick="simulateArrive()">GO</button>
      </div>
      <!-- Stat tiles -->
      <div class="stat-row" id="stat-row">
        <!-- filled by JS -->
      </div>
      <!-- Alerts -->
      <div class="nav-alerts" id="nav-alerts"></div>
      <!-- Step timeline -->
      <div class="step-timeline" id="step-timeline"></div>
      <!-- Report btn -->
      <div class="report-row">
        <button class="report-btn" onclick="openReportSheet(currentBuilding?.id)">
          <span>⚑</span> Report issue at this entrance
        </button>
      </div>
    </div>
  </div>

  <!-- ARRIVED OVERLAY -->
  <div id="arrived-overlay">
    <div class="arrived-bg"></div>
    <div class="confetti-wrap" id="confetti"></div>
    <div class="arrived-back">
      <div class="fab" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.15)" onclick="closeArrived()">←</div>
    </div>
    <div class="arrived-content">
      <div class="arrived-big">🎉</div>
      <div class="arrived-title">You're here!</div>
      <div class="arrived-bldg" id="arrived-bldg"></div>
      <div class="arrived-card" id="arrived-card"></div>
      <div class="arrived-issue" id="arrived-issue">
        <div style="font-size:18px">⚠</div>
        <div><div class="ai-title" id="ai-title"></div><div class="ai-desc" id="ai-desc"></div></div>
      </div>
      <div class="arrived-actions">
        <button class="btn-dark" onclick="openReportSheet(currentBuilding?.id)">⚑ Report a problem here</button>
        <button class="btn-green" onclick="closeArrived();closeNav()">Navigate to another building</button>
      </div>
    </div>
  </div>

  <!-- REPORT SHEET -->
  <div class="rsheet-overlay" id="rsheet" onclick="closeReportSheet(event)">
    <div class="rsheet">
      <div class="rsheet-handle"></div>
      <div class="rsheet-title">Report an issue</div>
      <div class="rsheet-sub">Help other wheelchair users by flagging barriers.</div>
      <div class="rtype-grid">
        <div class="rtype on" data-type="door" onclick="selRType(this)"><div class="rtype-icon">🚪</div><div class="rtype-lbl">Door/opener</div></div>
        <div class="rtype" data-type="elevator" onclick="selRType(this)"><div class="rtype-icon">🛗</div><div class="rtype-lbl">Elevator</div></div>
        <div class="rtype" data-type="path" onclick="selRType(this)"><div class="rtype-icon">🚧</div><div class="rtype-lbl">Blocked path</div></div>
        <div class="rtype" data-type="other" onclick="selRType(this)"><div class="rtype-icon">⚠</div><div class="rtype-lbl">Other</div></div>
      </div>
      <textarea class="rta" id="rta" placeholder="Describe what you found… (optional)"></textarea>
      <button class="rsubmit" onclick="submitReport()">Submit report</button>
    </div>
  </div>

</div><!-- /app -->

<script>
// ── ISSUES ────────────────────────────────────────────────────────
let ISSUES = [];
try { ISSUES = JSON.parse(localStorage.getItem('rampup_issues') || '[]'); } catch{}
if (!ISSUES.length) {
  ISSUES = [
    {id:'i1',building_id:'memorial_union',type:'door',desc:'North entrance door opener intermittent — strike mechanism to activate',status:'repair',reported:'2025-04-10',eta:'1–2 weeks'},
    {id:'i2',building_id:'ryan',type:'elevator',desc:'Floor 2 elevator pausing intermittently',status:'open',reported:'2025-04-07',eta:'Unknown'},
  ];
}
function hasIssue(id){ return ISSUES.some(i=>i.building_id===id); }
function getBuildingIssues(id){ return ISSUES.filter(i=>i.building_id===id); }

// ── STATE ──────────────────────────────────────────────────────────
let userLat=41.4812, userLng=-71.5260, userElev=43, locationGranted=false;
let currentBuilding=null, navMap=null, leafletLoaded=false;
let youMarker=null, destMarker=null, routeLine=null;
let activeFilter='all', searchQ='', reportBuildingId=null, rtype='door';
let stepInterval=null, currentStep=0;
let sheetDragStart=null, sheetTranslate=0;

// ── DIFFICULTY ENGINE ──────────────────────────────────────────────
function calcDiff(uElev, dElev, distM) {
  const delta = dElev - uElev;
  const g = distM > 0 ? Math.abs(delta)/distM : 0;
  const pct = Math.round(g * 100);
  const up = delta > 2, dn = delta < -2;
  if (pct < 2) return {key:'easy',label:'Flat route',emoji:'🟢',color:getComputedStyle(document.documentElement).getPropertyValue('--green').trim()||'#1aff8c',cls:'diff-easy',dots:1,note:'Flat — easy both ways',pct,up,dn};
  if (pct < 5) return up
    ? {key:'mod',label:'Moderate ↑',emoji:'🟡',color:'#ffbe1a',cls:'diff-mod',dots:2,note:`Gentle uphill ${pct}%`,pct,up,dn}
    : {key:'easy',label:'Easy ↓',emoji:'🟢',color:'#1aff8c',cls:'diff-easy',dots:1,note:`Downhill ${pct}% — uphill on return`,pct,up,dn};
  if (pct < 9) return up
    ? {key:'hard',label:'Hard ↑',emoji:'🔴',color:'#ff4a4a',cls:'diff-hard',dots:3,note:`Steep uphill ${pct}% — plan ahead`,pct,up,dn}
    : {key:'mod',label:'Moderate ↓',emoji:'🟡',color:'#ffbe1a',cls:'diff-mod',dots:2,note:`Downhill ${pct}% — steep return`,pct,up,dn};
  return up
    ? {key:'expert',label:'Expert ↑',emoji:'🟣',color:'#a855f7',cls:'diff-expert',dots:4,note:`Very steep ${pct}% — rollback risk`,pct,up,dn}
    : {key:'hard',label:'Hard ↓',emoji:'🔴',color:'#ff4a4a',cls:'diff-hard',dots:3,note:`Very steep downhill ${pct}%`,pct,up,dn};
}

// ── UTILS ─────────────────────────────────────────────────────────
function dist(a,b,c,d){
  const dLat=(c-a)*Math.PI/180, dLng=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLng/2)**2;
  return 6371000*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function distLabel(m){ return m<50?'Here':m<1000?Math.round(m/50)*50+'m':(m/1000).toFixed(1)+'km'; }
function sorted(){ return [...BUILDINGS].sort((a,b)=>dist(userLat,userLng,a.lat,a.lng)-dist(userLat,userLng,b.lat,b.lng)); }
function timeAgo(ds){const d=new Date(ds),n=new Date(),dy=Math.floor((n-d)/86400000);return dy===0?'Today':dy===1?'Yesterday':dy<7?dy+'d ago':Math.floor(dy/7)+'w ago';}

// ── ICONS / CATS ───────────────────────────────────────────────────
const CAT_ICON = {Academic:'🏛',Residential:'🏠',Dining:'🍽',Recreation:'🏋',Greek:'🏛'};
const TIER_NUM = {full:'♿',public:'⚡',limited:'⚠'};

// ── BUILDING LIST ──────────────────────────────────────────────────
function renderList() {
  const q = searchQ.toLowerCase();
  const filtered = BUILDINGS.filter(b => {
    const mq = !q || b.name.toLowerCase().includes(q) || (b.short||'').toLowerCase().includes(q) || b.cat.toLowerCase().includes(q) || b.grid.toLowerCase().includes(q);
    if (!mq) return false;
    if (activeFilter==='all') return true;
    if (activeFilter==='issues') return hasIssue(b.id);
    return b.access===activeFilter;
  });

  document.getElementById('where-count').textContent = filtered.length + ' buildings';

  const list = document.getElementById('blist');
  if (!filtered.length) {
    list.innerHTML = `<div style="text-align:center;padding:48px 20px;color:var(--text3);font-size:13px;font-family:var(--font2)">No buildings found</div>`;
    return;
  }

  list.innerHTML = filtered.map(b => {
    const d = dist(userLat, userLng, b.lat, b.lng);
    const df = calcDiff(userElev, b.elev, d);
    const hi = hasIssue(b.id);
    const num = b.grid ? b.grid : '?';
    const icon = CAT_ICON[b.cat] || '🏢';
    return `<div class="brow" onclick="startNav('${b.id}')">
      <div class="brow-num">
        <div class="brow-num-text ${b.access}">${icon}</div>
        <div class="brow-icon-sub">${b.grid}</div>
      </div>
      <div class="brow-body">
        <div class="brow-name">${b.short||b.name}</div>
        <div class="brow-meta">
          <span class="tier-tag tier-${b.access}">${b.access==='full'?'Accessible':b.access==='public'?'Public access':'Limited'}</span>
          <span class="brow-cat">${b.cat}</span>
          ${hi?'<span class="issue-badge">⚑ Issue</span>':''}
        </div>
        <div class="brow-meta" style="margin-top:4px">
          <span class="diff-badge ${df.cls}">${df.emoji} ${df.label}</span>
          <span class="brow-cat" style="font-size:9px">${b.terrain}</span>
        </div>
      </div>
      <div class="brow-right">
        <div class="brow-dist">${distLabel(d)}</div>
        <div class="brow-arrow">›</div>
      </div>
    </div>`;
  }).join('');
}

// ── SEARCH / FILTER ────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', e => {
  searchQ = e.target.value;
  renderList();
});
document.getElementById('filter-row').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  chip.classList.add('on');
  activeFilter = chip.dataset.f;
  renderList();
});

// ── MAP ────────────────────────────────────────────────────────────
function loadLeaflet(cb) {
  if (leafletLoaded) { cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
  s.onload = () => { leafletLoaded = true; cb(); };
  document.head.appendChild(s);
}

function initMap(cb) {
  if (navMap) { if (cb) cb(); return; } // never recreate
  const el = document.getElementById('map');
  el.innerHTML = '';
  navMap = L.map(el, {
    center: [41.4810, -71.5254], zoom: 15,
    zoomControl: false, attributionControl: true,
    preferCanvas: true, zoomSnap: 0.5
  });
  // Use CartoDB dark_all — natively dark, no CSS filter needed
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd', maxZoom: 20,
    attribution: '© OpenStreetMap contributors, © CARTO'
  }).addTo(navMap);
  // Hide attribution to keep it clean
  navMap.attributionControl.setPrefix(false);
  navMap.whenReady(() => {
    setTimeout(() => {
      navMap.invalidateSize({animate:false});
      if (cb) cb();
    }, 100);
  });
}

function addYouMarker() {
  if (!navMap) return;
  if (youMarker) navMap.removeLayer(youMarker);
  youMarker = L.marker([userLat,userLng], {
    icon: L.divIcon({html:'<div class="you-ring"></div>',className:'',iconSize:[22,22],iconAnchor:[11,11]})
  }).addTo(navMap);
}

function addRouteMarkers(b) {
  if (!navMap) return;
  if (destMarker) navMap.removeLayer(destMarker);
  if (routeLine) navMap.removeLayer(routeLine);

  const d = dist(userLat,userLng,b.lat,b.lng);
  const df = calcDiff(userElev, b.elev, d);

  // Dest pill marker
  const colMap = {full:'#1aff8c',public:'#ffbe1a',limited:'#ff4a4a'};
  const col = colMap[b.access] || '#1a9fff';
  const html = `<div style="background:${col};color:#000;font-size:12px;font-weight:900;padding:6px 12px;border-radius:18px;white-space:nowrap;box-shadow:0 4px 16px ${col}80;border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;gap:5px"><span>${b.entrance?.icon||'🏢'}</span><span>${b.short||b.name}</span></div>`;
  destMarker = L.marker([b.lat,b.lng], {
    icon: L.divIcon({html,className:'',iconAnchor:[60,16]})
  }).addTo(navMap);

  // Route line colored by difficulty
  routeLine = L.polyline([[userLat,userLng],[b.lat,b.lng]], {
    color: df.color, weight: 5, opacity: .85, dashArray: '12 8', lineCap: 'round'
  }).addTo(navMap);

  // Fit bounds but pad to keep map visible above the sheet (sheet takes ~55vh)
  const appH = document.getElementById('app').getBoundingClientRect().height;
  const sheetH = document.getElementById('sheet').getBoundingClientRect().height;
  const mapVisibleH = appH - sheetH;
  navMap.fitBounds([[userLat,userLng],[b.lat,b.lng]], {
    paddingTopLeft: [40, mapVisibleH * 0.1],
    paddingBottomRight: [40, mapVisibleH * 0.3],
    maxZoom: 17, animate: true, duration: 0.8
  });
}

function locateMe() {
  if (!navigator.geolocation) { showToast('Location not available'); return; }
  showToast('Finding your location…');
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    if (pos.coords.altitude) userElev = pos.coords.altitude;
    locationGranted = true;
    if (navMap) {
      navMap.flyTo([userLat,userLng], 17, {animate:true,duration:1});
      addYouMarker();
    } else {
      loadLeaflet(() => initMap(() => { addYouMarker(); }));
    }
    renderList();
    showToast('Location found');
  }, () => showToast('Could not access location'));
}

// ── NAVIGATION ─────────────────────────────────────────────────────
function startNav(id) {
  const b = BUILDINGS.find(x=>x.id===id);
  if (!b) return;
  currentBuilding = b;
  buildNavSheet(b);
  openNavSheet();
  // Update map without destroying it
  loadLeaflet(() => {
    if (!navMap) {
      initMap(() => { addYouMarker(); addRouteMarkers(b); });
    } else {
      addRouteMarkers(b);
      requestAnimationFrame(() => navMap.invalidateSize({animate:false}));
    }
  });
  document.getElementById('search-input').value = '';
  searchQ = '';
}

function buildNavSheet(b) {
  const d = dist(userLat,userLng,b.lat,b.lng);
  const df = calcDiff(userElev, b.elev, d);
  const bIssues = getBuildingIssues(b.id);
  const hi = bIssues.length > 0;
  const tierCls = {full:'full',public:'public',limited:'limited'};

  // Route number (use first 2 chars of grid as the "route")
  document.getElementById('nav-num').textContent = b.grid;
  document.getElementById('nav-num').className = 'nav-route-num ' + b.access;
  document.getElementById('nav-dest-name').textContent = b.name;
  document.getElementById('nav-sub').textContent = (b.entrance?.side || 'Accessible entrance') + ' · ' + distLabel(d) + ' away';

  // Stat tiles
  const walkMin = Math.max(1, Math.round(d / 50)); // ~50m/min in wheelchair
  const statRow = document.getElementById('stat-row');
  statRow.innerHTML = `
    <div class="stat-tile stat-tile-primary">
      <div class="stat-num">${walkMin}</div>
      <div class="stat-label">minutes away</div>
    </div>
    <div class="stat-tile stat-tile-secondary">
      <div style="font-size:20px;margin-bottom:4px">${df.emoji}</div>
      <div class="stat-label" style="color:${df.color};font-size:12px;font-weight:800">${df.label}</div>
      <div class="stat-sublabel" style="color:${df.color}">${df.note}</div>
    </div>
    <div class="stat-tile stat-tile-secondary" style="min-width:100px">
      <div class="stat-num" style="font-size:18px;color:var(--text2)">${b.entrance?.side||'Main entrance'}</div>
      <div class="stat-label">entrance</div>
    </div>`;

  // Alerts
  const navAlerts = document.getElementById('nav-alerts');
  navAlerts.innerHTML = '';
  if (hi) {
    const pill = document.createElement('div');
    pill.className = 'nav-alert-pill nav-alert-warn';
    pill.innerHTML = `⚠ ${bIssues[0].desc.substring(0,50)}${bIssues[0].desc.length>50?'…':''}`;
    navAlerts.appendChild(pill);
  }
  if (b.entrance?.warning) {
    const pill = document.createElement('div');
    pill.className = 'nav-alert-pill nav-alert-info';
    pill.innerHTML = `💬 ${b.entrance.warning}`;
    navAlerts.appendChild(pill);
  }

  // Steps with timeline
  const steps = b.steps || ['Head toward ' + b.name, 'Use the accessible entrance'];
  const timeline = document.getElementById('step-timeline');
  currentStep = 0;

  timeline.innerHTML = steps.map((s,i) => {
    const isLast = i === steps.length - 1;
    const dotCls = i===0?'active':'upcoming';
    const lineCls = i===0?'active':'';
    return `
      <div class="step-row">
        <div class="step-dot-col">
          <div class="step-dot ${dotCls}" id="sdot-${i}"></div>
          ${!isLast?`<div class="step-line ${lineCls}" id="sline-${i}"></div>`:''}
        </div>
        <div class="step-content" id="scontent-${i}">
          <div class="step-time" id="stime-${i}">${i===0?'NOW':'NEXT'}</div>
          <div class="step-text">${s}</div>
          ${i===0?`<div class="step-subtext">${distLabel(d)} to destination · ${walkMin} min walk</div>`:''}
          ${isLast && b.entrance ? `
            <div class="step-entrance-card">
              <div class="ent-label">At your destination</div>
              <div class="ent-side">${b.entrance.side}</div>
              <div class="ent-features">
                ${(b.entrance.features||[]).map(f=>`<span class="ent-feat">${f}</span>`).join('')}
                ${b.entrance.warning?`<span class="ent-feat warn">⚠ ${b.entrance.warning}</span>`:''}
              </div>
            </div>` : ''}
        </div>
      </div>`;
  }).join('');

  // Auto-advance steps
  if (stepInterval) clearInterval(stepInterval);
  stepInterval = setInterval(() => {
    const prev = document.getElementById(`sdot-${currentStep}`);
    const prevLine = document.getElementById(`sline-${currentStep}`);
    if (prev) { prev.className='step-dot done'; }
    if (prevLine) { prevLine.className='step-line done'; }
    const stEl = document.getElementById(`stime-${currentStep}`);
    if (stEl) stEl.textContent = '✓ DONE';
    currentStep++;
    if (currentStep < steps.length) {
      const cur = document.getElementById(`sdot-${currentStep}`);
      const curLine = document.getElementById(`sline-${currentStep}`);
      if (cur) cur.className = 'step-dot active';
      if (curLine) curLine.className = 'step-line active';
      const stCur = document.getElementById(`stime-${currentStep}`);
      if (stCur) stCur.textContent = 'NOW';
    } else {
      clearInterval(stepInterval); stepInterval = null;
    }
  }, 3800);
}

function openNavSheet() {
  const sheet = document.getElementById('sheet');
  sheet.classList.add('nav-mode');
  sheet.style.height = ''; // let CSS nav-mode height rule apply
  document.getElementById('fab-close-nav').style.display = 'flex';
  document.getElementById('search-bar').style.top = '-100px';
  // Invalidate map after sheet resize
  setTimeout(() => { if(navMap) navMap.invalidateSize({animate:false}); }, 400);
}

function closeNav() {
  if (stepInterval) { clearInterval(stepInterval); stepInterval=null; }
  const sheet = document.getElementById('sheet');
  sheet.classList.remove('nav-mode');
  document.getElementById('fab-close-nav').style.display = 'none';
  document.getElementById('search-bar').style.top = `calc(70px + var(--st))`;
  const sheetEl = document.getElementById('sheet');
  sheetEl.style.height = '';
  sheetEl.classList.remove('expanded');
  currentBuilding = null;
  if (routeLine && navMap) { navMap.removeLayer(routeLine); routeLine=null; }
  if (destMarker && navMap) { navMap.removeLayer(destMarker); destMarker=null; }
  setTimeout(() => { if(navMap) navMap.invalidateSize({animate:false}); }, 400);
  renderList();
}

// ── ARRIVAL ────────────────────────────────────────────────────────
function simulateArrive() {
  if (!currentBuilding) return;
  const b = currentBuilding;
  if (stepInterval) { clearInterval(stepInterval); stepInterval=null; }

  document.getElementById('arrived-bldg').textContent = b.name;

  const ent = b.entrance || {side:'Main entrance',features:[],icon:'🏢'};
  const bIssues = getBuildingIssues(b.id);

  document.getElementById('arrived-card').innerHTML = `
    <div style="font-size:22px;margin-bottom:8px">${ent.icon||'🏢'}</div>
    <div class="arrived-ent-side">${ent.side}</div>
    <div class="arrived-feats">
      ${(ent.features||[]).map(f=>`<span class="arrived-feat">${f}</span>`).join('')}
      ${ent.warning?`<span class="arrived-feat warn">⚠ ${ent.warning}</span>`:''}
    </div>`;

  if (bIssues.length) {
    document.getElementById('arrived-issue').classList.add('show');
    document.getElementById('ai-title').textContent = 'Active issue reported here';
    document.getElementById('ai-desc').textContent = bIssues[0].desc;
  } else {
    document.getElementById('arrived-issue').classList.remove('show');
  }

  spawnConfetti();
  document.getElementById('arrived-overlay').classList.add('show');
}

function closeArrived() {
  document.getElementById('arrived-overlay').classList.remove('show');
  document.getElementById('confetti').innerHTML = '';
}

function spawnConfetti() {
  const c = document.getElementById('confetti'); c.innerHTML='';
  const cols = ['#1a9fff','#1aff8c','#ffbe1a','#ff4a4a','#a855f7','#fff'];
  for (let i=0;i<28;i++) {
    const el = document.createElement('div');
    el.className='cp';
    el.style.cssText = `left:${Math.random()*100}%;width:${5+Math.random()*8}px;height:${5+Math.random()*8}px;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*1.2}s;border-radius:${Math.random()>.5?'50%':'3px'}`;
    c.appendChild(el);
  }
}

// ── REPORT ─────────────────────────────────────────────────────────
function openReportSheet(bid) {
  reportBuildingId = bid || null;
  document.getElementById('rsheet').classList.add('open');
}
function closeReportSheet(e) {
  if (e.target === document.getElementById('rsheet')) document.getElementById('rsheet').classList.remove('open');
}
function selRType(el) {
  document.querySelectorAll('.rtype').forEach(r=>r.classList.remove('on'));
  el.classList.add('on'); rtype = el.dataset.type;
}
function submitReport() {
  const desc = document.getElementById('rta').value.trim() || 'No description provided.';
  const titles = {door:'Door/opener issue',elevator:'Elevator issue',path:'Path blocked',other:'Barrier reported'};
  const b = BUILDINGS.find(x=>x.id===reportBuildingId);
  ISSUES.unshift({id:'u'+Date.now(),building_id:reportBuildingId||'unknown',building:b?b.name:'Unknown',type:rtype,desc,status:'open',reported:new Date().toISOString().split('T')[0],eta:'Under review'});
  try{localStorage.setItem('rampup_issues',JSON.stringify(ISSUES));}catch{}
  document.getElementById('rsheet').classList.remove('open');
  document.getElementById('rta').value = '';
  const btn = document.querySelector('.rsubmit');
  btn.textContent = '✓ Reported — thank you!';
  btn.style.background = '#1aff8c'; btn.style.color = '#000';
  setTimeout(()=>{btn.textContent='Submit report';btn.style.background='';btn.style.color='';},2500);
  updateAlertPill();
  if (navMap) addRouteMarkers(currentBuilding); // refresh map markers
}

function updateAlertPill() {
  const openCount = ISSUES.filter(i=>i.status!=='resolved').length;
  const pill = document.getElementById('alert-pill');
  const text = document.getElementById('alert-text');
  if (openCount > 0) {
    pill.classList.add('show');
    text.textContent = openCount + ' issue' + (openCount>1?'s':'') + ' reported on campus';
  }
}

// ── SHEET DRAG ─────────────────────────────────────────────────────
// Simple touch drag to resize sheet
const handle = document.getElementById('sheet-handle');
const sheet = document.getElementById('sheet');
let dragY0 = 0, sheetH0 = 0;
handle.addEventListener('touchstart', e => {
  dragY0 = e.touches[0].clientY;
  sheetH0 = sheet.getBoundingClientRect().height;
}, {passive:true});
handle.addEventListener('touchmove', e => {
  const dy = dragY0 - e.touches[0].clientY;
  const newH = Math.min(Math.max(sheetH0 + dy, 140), window.innerHeight * .88);
  sheet.style.height = newH + 'px';
}, {passive:true});
handle.addEventListener('touchend', e => {
  // Snap to nearest state
  const h = sheet.getBoundingClientRect().height;
  const winH = window.innerHeight;
  if (h > winH * .75) {
    sheet.classList.add('expanded');
  } else if (h < winH * .35) {
    sheet.style.height = '';
    sheet.classList.remove('expanded');
  } else {
    sheet.style.height = '';
    sheet.classList.remove('expanded');
  }
}, {passive:true});

// ── TOAST ──────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id='toast';
    t.style.cssText='position:absolute;bottom:calc(90px + var(--sb));left:50%;transform:translateX(-50%);background:rgba(255,255,255,.12);backdrop-filter:blur(12px);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;z-index:999;transition:opacity .25s;border:1px solid rgba(255,255,255,.15);font-family:var(--font)';
    document.getElementById('app').appendChild(t);
  }
  t.textContent = msg; t.style.opacity='1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.style.opacity='0', 2400);
}

// ── INIT ──────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  // Try GPS silently
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos=>{
      userLat=pos.coords.latitude; userLng=pos.coords.longitude;
      if(pos.coords.altitude) userElev=pos.coords.altitude;
      locationGranted=true;
      renderList();
      if (navMap) { addYouMarker(); navMap.flyTo([userLat,userLng],16); }
    }, ()=>{});
  }

  renderList();
  updateAlertPill();

  // Load map immediately (Transit-style: map is always the canvas)
  loadLeaflet(() => {
    initMap(() => {
      addYouMarker();
      // Show all accessible buildings as small dots on initial map
      BUILDINGS.forEach(b => {
        const colMap={full:'#1aff8c',public:'#ffbe1a',limited:'#ff4a4a'};
        const col = colMap[b.access]||'#1a9fff';
        const hi = hasIssue(b.id);
        const dotHtml=`<div style="width:${hi?12:8}px;height:${hi?12:8}px;border-radius:50%;background:${hi?'#ffbe1a':col};border:2px solid rgba(255,255,255,.4);box-shadow:0 0 ${hi?10:6}px ${col}60;cursor:pointer;transition:transform .15s" onmouseover="this.style.transform='scale(1.4)'" onmouseout="this.style.transform=''"></div>`;
        L.marker([b.lat,b.lng],{
          icon:L.divIcon({html:dotHtml,className:'',iconSize:[hi?12:8,hi?12:8],iconAnchor:[hi?6:4,hi?6:4]})
        }).addTo(navMap).on('click',()=>startNav(b.id));
      });
      navMap.setView([41.4810,-71.5254],15);
    });
  });

  // Check deep-link
  const params = new URLSearchParams(location.search);
  const bid = params.get('building');
  if (bid) setTimeout(()=>startNav(bid), 800);

  // PWA service worker
  if ('serviceWorker' in navigator) {
    const sw=`const C='rampup-v4';const A=['/'];self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(A)));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/'))));});`;
    const blob=new Blob([sw],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  }
});
</script>
